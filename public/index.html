<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles.css">
    <title>youtube downloader</title>
</head>
<body>

    <div id="clear"><img id="clearIcon" src="./assets/images/icons/close.png"></div>

    <div id="container">
        <input id="videoURLInput" type="url">

        <div id="mediaType">
            format: 
            <input class="mediaTypeSelection" type="radio" name="mediaType" mediaType="mp3"> mp3
            <input class="mediaTypeSelection" type="radio" name="mediaType" mediaType="mp4" checked> mp4
        </div>

        <div id="quality">
            quality: 
            <input class="qualitySelection" type="radio" name="quality" quality="high"> high 
            <input class="qualitySelection" type="radio" name="quality" quality="med"> med 
            <input class="qualitySelection" type="radio" name="quality" quality="low" checked> low
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-4.0.0.js" integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U=" crossorigin="anonymous"></script>
    <script src="./index.js"></script>
</body>
</html>
